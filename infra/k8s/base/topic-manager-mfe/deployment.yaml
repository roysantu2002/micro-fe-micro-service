# infra/k8s/base/topic-manager-mfe/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: topic-manager-mfe
  namespace: yt-planner
  labels:
    app: topic-manager-mfe
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: topic-manager-mfe
  template:
    metadata:
      labels:
        app: topic-manager-mfe
        tier: frontend
    spec:
      containers:
        - name: topic-manager-mfe
          image: ytplanneracr.azurecr.io/topic-manager-mfe:v1
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
# infra/k8s/base/topic-manager-mfe/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: topic-manager-mfe-svc
  namespace: yt-planner
spec:
  selector:
    app: topic-manager-mfe
  ports:
    - port: 3001
      targetPort: 3001