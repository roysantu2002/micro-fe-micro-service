# ============================================================================
# IMPORTANT: This file contains placeholder values for learning/development.
# Replace <base64-encoded-value> with actual base64-encoded secrets before applying.
#
# To encode a value:
#   echo -n 'your-value' | base64
#
# Example:
#   echo -n 'youtube_planner' | base64   => eW91dHViZV9wbGFubmVy
#   echo -n 'planner' | base64           => cGxhbm5lcg==
#   echo -n 'planner_secret' | base64    => cGxhbm5lcl9zZWNyZXQ=
#
# Or use kubectl to create secrets directly (recommended for learning):
#   kubectl create secret generic db-credentials \
#     --namespace yt-planner \
#     --from-literal=POSTGRES_DB=youtube_planner \
#     --from-literal=POSTGRES_USER=planner \
#     --from-literal=POSTGRES_PASSWORD=planner_secret \
#     --from-literal=SPRING_DATASOURCE_URL='jdbc:postgresql://postgres-svc:5432/youtube_planner' \
#     --from-literal=SPRING_DATASOURCE_USERNAME=planner \
#     --from-literal=SPRING_DATASOURCE_PASSWORD=planner_secret
#
#   kubectl create secret generic openai-api-key \
#     --namespace yt-planner \
#     --from-literal=OPENAI_API_KEY='sk-your-actual-key-here'
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: yt-planner
type: Opaque
data:
  # echo -n 'youtube_planner' | base64
  POSTGRES_DB: eW91dHViZV9wbGFubmVy
  # echo -n 'planner' | base64
  POSTGRES_USER: cGxhbm5lcg==
  # echo -n 'planner_secret' | base64
  POSTGRES_PASSWORD: cGxhbm5lcl9zZWNyZXQ=
  # echo -n 'jdbc:postgresql://postgres-svc:5432/youtube_planner' | base64
  SPRING_DATASOURCE_URL: amRiYzpwb3N0Z3Jlc3FsOi8vcG9zdGdyZXMtc3ZjOjU0MzIveW91dHViZV9wbGFubmVy
  # echo -n 'planner' | base64
  SPRING_DATASOURCE_USERNAME: cGxhbm5lcg==
  # echo -n 'planner_secret' | base64
  SPRING_DATASOURCE_PASSWORD: cGxhbm5lcl9zZWNyZXQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-api-key
  namespace: yt-planner
type: Opaque
data:
  # Replace with: echo -n 'sk-your-actual-openai-key' | base64
  OPENAI_API_KEY: c2steW91ci1hY3R1YWwtb3BlbmFpLWtleQ==
