version: "3.9"

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: yt-planner-postgres
    environment:
      POSTGRES_DB: youtube_planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d youtube_planner"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yt-planner-network

  redis:
    image: redis:7-alpine
    container_name: yt-planner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yt-planner-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: yt-planner-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - yt-planner-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: yt-planner-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - yt-planner-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: yt-planner-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - yt-planner-network

  # ============================================
  # API Gateway
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: yt-planner-gateway
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - topic-service
      - content-service
    networks:
      - yt-planner-network

  # ============================================
  # Application Services (uncomment when ready)
  # ============================================

  topic-service:
    build:
      context: ./backend/topic-service
      dockerfile: Dockerfile
    container_name: yt-planner-topic-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/youtube_planner
      SPRING_DATASOURCE_USERNAME: planner
      SPRING_DATASOURCE_PASSWORD: planner_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yt-planner-network

  content-service:
    build:
      context: ./backend/content-service
      dockerfile: Dockerfile
    container_name: yt-planner-content-service
    ports:
      - "8082:8082"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yt-planner-network

  # ============================================
  # Frontend Services (Micro-Frontends)
  # ============================================

  topic-manager-mfe:
    build:
      context: ./frontend/topic-manager-mfe
      dockerfile: Dockerfile
    container_name: yt-planner-topic-manager
    ports:
      - "3011:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://nginx
    networks:
      - yt-planner-network

  content-writer-mfe:
    build:
      context: ./frontend/content-writer-mfe
      dockerfile: Dockerfile
    container_name: yt-planner-content-writer
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://nginx
    networks:
      - yt-planner-network

  shell-app:
    build:
      context: ./frontend/shell-app
      dockerfile: Dockerfile
    container_name: yt-planner-shell-app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://nginx
      NEXT_PUBLIC_TOPIC_MANAGER_URL: http://topic-manager-mfe:3001
      NEXT_PUBLIC_CONTENT_WRITER_URL: http://content-writer-mfe:3002
    depends_on:
      - topic-manager-mfe
      - content-writer-mfe
    networks:
      - yt-planner-network

volumes:
  postgres-data:
  redis-data:

networks:
  yt-planner-network:
    driver: bridge
